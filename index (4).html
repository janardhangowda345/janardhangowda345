*{margin:0;padding:0;box-sizing:border-box;}

/* ====== HERO FIX (ONLY CHANGE) ====== */
.h-name .lime {
  display:inline-block;
  position:relative;
  color:transparent;
  -webkit-text-stroke:2px #c8f542;
  text-stroke:2px #c8f542;
  animation:beGlitch 7s ease-in-out infinite;
}

@keyframes beGlitch {
  0%,99%,100% { transform:translate(0,0); -webkit-text-stroke-color:#c8f542; }
  99.1% { transform:translate(-4px,0); -webkit-text-stroke-color:#fff; }
  99.2% { transform:translate(4px,0); -webkit-text-stroke-color:#c8f542; }
  99.3% { transform:translate(-2px,0); -webkit-text-stroke-color:#fff; }
  99.4% { transform:translate(0,0); -webkit-text-stroke-color:#c8f542; }
}
